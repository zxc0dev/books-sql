services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${MAIN_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      retries: 5

  db_init:
    build: .
    command: >
      python -c "
      from src.db_init.db_setup import create_database, create_tables;
      create_database();
      create_tables()
      "
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: "no"

  pipeline:
    build: .
    command: python -m src.pipeline
    depends_on:
      db_init:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./dbt:/app/dbt
    restart: "no"

volumes:
  postgres_data: